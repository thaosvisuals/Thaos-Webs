<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>†HΛOS Web</title>
    <meta name="description" content="Diseño y desarrollo de páginas web estáticas personalizadas.">
    <style>html,body{background:#050504;overflow-x:hidden;}</style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --charcoal: #0b0b0b;
        --charcoal-deep: #050505;
        --charcoal-soft: #111111;
        --card: #171717;
        --hover: #1d1d1d;
        --old-gold: #b89a5b;
        --old-gold-muted: #9f7a32;
        --bone: #d6d6d6;
        --bone-muted: #8a8a8a;
        --line: rgba(184, 154, 91, 0.34);
        --sepia-shadow: rgba(64, 42, 25, 0.24);
        --font-main: "Cinzel", Georgia, "Times New Roman", serif;
        --font-accent: "Almendra", Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: #050504;
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        font-family: var(--font-main);
        color: var(--bone);
        background:
          radial-gradient(circle at 50% 16%, rgba(184, 154, 91, 0.075), transparent 29rem),
          radial-gradient(circle at 16% 82%, rgba(82, 47, 24, 0.16), transparent 30rem),
          linear-gradient(145deg, var(--charcoal-deep), var(--charcoal) 52%, var(--charcoal-soft));
        background-color: #050504;
        overflow-x: hidden;
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          radial-gradient(circle at 18% 28%, rgba(184, 154, 91, 0.035) 0 1px, transparent 1.5px),
          radial-gradient(circle at 64% 72%, rgba(214, 214, 214, 0.025) 0 1px, transparent 1.5px),
          linear-gradient(rgba(214, 214, 214, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(214, 214, 214, 0.012) 1px, transparent 1px);
        background-size: 29px 31px, 43px 47px, 56px 56px, 56px 56px;
        opacity: 0.62;
        mask-image: radial-gradient(circle at center, black, transparent 82%);
      }

      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          radial-gradient(ellipse at 50% 18%, rgba(23, 23, 23, 0), rgba(0, 0, 0, 0.38) 72%),
          linear-gradient(90deg, transparent, rgba(184, 154, 91, 0.16), transparent) center top / min(72vw, 860px) 1px no-repeat,
          linear-gradient(90deg, transparent, rgba(159, 122, 50, 0.12), transparent) center bottom / min(64vw, 760px) 1px no-repeat;
        opacity: 0.84;
      }

      .entry-screen {
        position: relative;
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: clamp(2rem, 7vw, 5.5rem);
        isolation: isolate;
      }

      .entry-panel {
        width: min(100%, 780px);
        text-align: center;
        padding: clamp(0.6rem, 2vw, 1.1rem);
        animation: portalIn 820ms ease-out both;
      }

      .entry-mark {
        display: inline-flex;
        width: clamp(4.6rem, 13vw, 7.25rem);
        height: 1px;
        margin-bottom: clamp(2rem, 5vw, 3.4rem);
        background: linear-gradient(90deg, transparent, var(--old-gold), transparent);
        opacity: 0.78;
      }

      h1 {
        margin: 0;
        max-width: 100%;
        font-family: var(--font-main);
        font-size: clamp(3.45rem, 12vw, 8.2rem);
        font-weight: 500;
        line-height: 0.96;
        letter-spacing: 0;
        color: var(--bone);
        overflow-wrap: break-word;
        text-shadow: 0 18px 42px rgba(0, 0, 0, 0.52), 0 0 24px rgba(184, 154, 91, 0.08);
      }

      .entry-subtitle {
        max-width: 620px;
        margin: clamp(1.45rem, 3.2vw, 2.35rem) auto 0;
        color: var(--bone-muted);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1rem, 2vw, 1.16rem);
        font-weight: 400;
        line-height: 1.78;
      }

      .entry-phrase {
        margin: clamp(1.8rem, 4vw, 2.8rem) 0 0;
        color: var(--old-gold);
        font-family: var(--font-accent);
        font-size: clamp(0.78rem, 1.7vw, 0.92rem);
        font-style: italic;
        letter-spacing: 0.14em;
        text-transform: none;
      }

      .entry-actions {
        display: flex;
        justify-content: center;
        margin-top: clamp(2.7rem, 6vw, 4.35rem);
      }

      .entry-button {
        position: relative;
        display: inline-flex;
        min-width: min(100%, 13.5rem);
        min-height: 3.4rem;
        align-items: center;
        justify-content: center;
        padding: 1rem 2.25rem;
        overflow: hidden;
        border: 1px solid var(--line);
        color: var(--bone);
        background:
          linear-gradient(180deg, rgba(184, 154, 91, 0.07), rgba(23, 23, 23, 0.62)),
          var(--card);
        box-shadow:
          inset 0 0 0 1px rgba(214, 214, 214, 0.035),
          0 18px 46px rgba(0, 0, 0, 0.34),
          0 8px 34px var(--sepia-shadow);
        font-family: var(--font-main);
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        line-height: 1;
        text-decoration: none;
        transition: border-color 220ms ease, box-shadow 220ms ease, color 220ms ease, transform 220ms ease, background 220ms ease;
      }

      .entry-button::before,
      .entry-button::after {
        position: absolute;
        top: 50%;
        width: 1.9rem;
        height: 1px;
        content: "";
        background: var(--old-gold-muted);
        opacity: 0.72;
        transform: translateY(-50%);
      }

      .entry-button::before {
        left: 0.75rem;
      }

      .entry-button::after {
        right: 0.75rem;
      }

      .entry-button:hover,
      .entry-button:focus-visible {
        border-color: rgba(184, 154, 91, 0.56);
        color: #d6d6d6;
        background:
          linear-gradient(180deg, rgba(184, 154, 91, 0.11), rgba(29, 29, 29, 0.72)),
          var(--hover);
        box-shadow:
          inset 0 0 0 1px rgba(214, 214, 214, 0.055),
          0 22px 54px rgba(0, 0, 0, 0.42),
          0 0 18px rgba(184, 154, 91, 0.07);
        transform: translateY(-2px);
      }

      .entry-button:focus-visible {
        outline: 1px solid rgba(232, 225, 210, 0.76);
        outline-offset: 5px;
      }

      .entry-button:active {
        transform: translateY(0);
      }

      @keyframes portalIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }

      @media (max-width: 560px) {
        .entry-screen {
          padding: 2rem 1.35rem;
        }

        .entry-mark {
          margin-bottom: 1.8rem;
        }

        h1 {
          font-size: clamp(3.1rem, 18vw, 4.65rem);
          line-height: 0.92;
          letter-spacing: -0.01em;
        }

        .entry-subtitle {
          font-size: 0.98rem;
          line-height: 1.62;
        }

        .entry-phrase {
          letter-spacing: 0.13em;
        }

        .entry-button {
          width: min(100%, 14rem);
          padding-right: 2rem;
          padding-left: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="entry-screen" aria-labelledby="entry-title">
      <section class="entry-panel">
        <span class="entry-mark" aria-hidden="true"></span>
        <h1 id="entry-title">†HΛOS Web</h1>
        <p class="entry-subtitle">Diseño y desarrollo de páginas web estáticas personalizadas.</p>
        <p class="entry-phrase">Forma regit perceptionem.</p>
        <div class="entry-actions">
          <a class="entry-button" href="home.html" data-enter-link>INGRESAR</a>
        </div>
      </section>
    </main>

    <script>
      const enterLink = document.querySelector("[data-enter-link]");
      const portalAudioSrc = "audio/universfield-mouse-click-117076.mp3";

      enterLink.addEventListener("click", (event) => {
        event.preventDefault();

        if (enterLink.dataset.entering === "true") {
          return;
        }

        enterLink.dataset.entering = "true";

        const portalAudio = new Audio(portalAudioSrc);
        let didNavigate = false;

        const goToHome = () => {
          if (didNavigate) {
            return;
          }

          didNavigate = true;
          window.location.replace("home.html");
        };

        portalAudio.addEventListener("ended", goToHome, { once: true });
        portalAudio.addEventListener("error", goToHome, { once: true });

        const playRequest = portalAudio.play();

        if (playRequest && typeof playRequest.catch === "function") {
          playRequest.catch(goToHome);
        }
      });
    </script>
  </body>
</html>
