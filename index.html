<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>†HΛOS Web</title>
    <meta name="description" content="Diseño y desarrollo de páginas web estáticas personalizadas.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <style>
      :root {
        color-scheme: dark;
        --charcoal: #0d0c0a;
        --charcoal-deep: #070706;
        --charcoal-soft: #161411;
        --old-gold: #a88a4a;
        --old-gold-muted: #80693b;
        --bone: #e8e1d2;
        --bone-muted: #b8ad99;
        --line: rgba(168, 138, 74, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--charcoal);
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        color: var(--bone);
        background:
          radial-gradient(circle at 50% 18%, rgba(168, 138, 74, 0.1), transparent 28rem),
          linear-gradient(145deg, var(--charcoal-deep), var(--charcoal) 48%, #11100e);
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(rgba(232, 225, 210, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(232, 225, 210, 0.018) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black, transparent 78%);
      }

      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(90deg, transparent, rgba(168, 138, 74, 0.18), transparent) center top / min(72vw, 860px) 1px no-repeat,
          linear-gradient(90deg, transparent, rgba(168, 138, 74, 0.12), transparent) center bottom / min(64vw, 760px) 1px no-repeat;
        opacity: 0.8;
      }

      .entry-screen {
        position: relative;
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: clamp(2rem, 7vw, 5.5rem);
        isolation: isolate;
      }

      .entry-panel {
        width: min(100%, 780px);
        text-align: center;
        animation: portalIn 820ms ease-out both;
      }

      .entry-mark {
        display: inline-flex;
        width: clamp(4.6rem, 13vw, 7.25rem);
        height: 1px;
        margin-bottom: clamp(2rem, 5vw, 3.4rem);
        background: linear-gradient(90deg, transparent, var(--old-gold), transparent);
        opacity: 0.78;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        font-size: clamp(3.45rem, 12vw, 8.2rem);
        font-weight: 400;
        line-height: 0.92;
        letter-spacing: 0;
        color: var(--bone);
        text-shadow: 0 0 34px rgba(168, 138, 74, 0.14);
      }

      .entry-subtitle {
        max-width: 620px;
        margin: clamp(1.45rem, 3.2vw, 2.35rem) auto 0;
        color: var(--bone-muted);
        font-family: Candara, "Segoe UI", system-ui, sans-serif;
        font-size: clamp(1rem, 2.2vw, 1.22rem);
        font-weight: 400;
        line-height: 1.7;
      }

      .entry-phrase {
        margin: clamp(1.8rem, 4vw, 2.8rem) 0 0;
        color: var(--old-gold);
        font-size: clamp(0.78rem, 1.7vw, 0.92rem);
        font-style: italic;
        letter-spacing: 0.18em;
        text-transform: none;
      }

      .entry-actions {
        display: flex;
        justify-content: center;
        margin-top: clamp(2.7rem, 6vw, 4.35rem);
      }

      .entry-button {
        position: relative;
        display: inline-flex;
        min-width: min(100%, 13.5rem);
        min-height: 3.4rem;
        align-items: center;
        justify-content: center;
        padding: 1rem 2.25rem;
        overflow: hidden;
        border: 1px solid var(--line);
        color: var(--bone);
        background: linear-gradient(180deg, rgba(168, 138, 74, 0.08), rgba(13, 12, 10, 0.24));
        box-shadow: inset 0 0 0 1px rgba(232, 225, 210, 0.035), 0 18px 46px rgba(0, 0, 0, 0.28);
        font-family: Candara, "Segoe UI", system-ui, sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.24em;
        line-height: 1;
        text-decoration: none;
        transition: border-color 220ms ease, box-shadow 220ms ease, color 220ms ease, transform 220ms ease, background 220ms ease;
      }

      .entry-button::before,
      .entry-button::after {
        position: absolute;
        top: 50%;
        width: 1.9rem;
        height: 1px;
        content: "";
        background: var(--old-gold-muted);
        opacity: 0.72;
        transform: translateY(-50%);
      }

      .entry-button::before {
        left: 0.75rem;
      }

      .entry-button::after {
        right: 0.75rem;
      }

      .entry-button:hover,
      .entry-button:focus-visible {
        border-color: rgba(168, 138, 74, 0.72);
        color: #f0e6d2;
        background: linear-gradient(180deg, rgba(168, 138, 74, 0.13), rgba(13, 12, 10, 0.38));
        box-shadow: inset 0 0 0 1px rgba(232, 225, 210, 0.06), 0 20px 50px rgba(0, 0, 0, 0.34), 0 0 24px rgba(168, 138, 74, 0.12);
        transform: translateY(-2px);
      }

      .entry-button:focus-visible {
        outline: 1px solid rgba(232, 225, 210, 0.76);
        outline-offset: 5px;
      }

      .entry-button:active {
        transform: translateY(0);
      }

      @keyframes portalIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }

      @media (max-width: 560px) {
        .entry-screen {
          padding: 2rem 1.35rem;
        }

        .entry-mark {
          margin-bottom: 1.8rem;
        }

        h1 {
          font-size: clamp(3.1rem, 18vw, 4.65rem);
        }

        .entry-subtitle {
          font-size: 0.98rem;
          line-height: 1.62;
        }

        .entry-phrase {
          letter-spacing: 0.13em;
        }

        .entry-button {
          width: min(100%, 14rem);
          padding-right: 2rem;
          padding-left: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="entry-screen" aria-labelledby="entry-title">
      <section class="entry-panel">
        <span class="entry-mark" aria-hidden="true"></span>
        <h1 id="entry-title">†HΛOS Web</h1>
        <p class="entry-subtitle">Diseño y desarrollo de páginas web estáticas personalizadas.</p>
        <p class="entry-phrase">Forma regit perceptionem.</p>
        <div class="entry-actions">
          <a class="entry-button" href="home.html" data-enter-link>INGRESAR</a>
        </div>
      </section>
    </main>

    <script>
      const enterLink = document.querySelector("[data-enter-link]");
      const portalAudioSrc = "audio/universfield-mouse-click-117076.mp3";

      enterLink.addEventListener("click", (event) => {
        event.preventDefault();

        if (enterLink.dataset.entering === "true") {
          return;
        }

        enterLink.dataset.entering = "true";

        const portalAudio = new Audio(portalAudioSrc);
        let didNavigate = false;

        const goToHome = () => {
          if (didNavigate) {
            return;
          }

          didNavigate = true;
          window.location.replace("home.html");
        };

        portalAudio.addEventListener("ended", goToHome, { once: true });
        portalAudio.addEventListener("error", goToHome, { once: true });

        const playRequest = portalAudio.play();

        if (playRequest && typeof playRequest.catch === "function") {
          playRequest.catch(goToHome);
        }
      });
    </script>
  </body>
</html>
